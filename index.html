<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Link Nuzlocke - Ultra Sun/Moon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Player indicators top corners -->
        <div class="player-indicator sun-indicator" id="sunIndicator">
            <img src="https://archives.bulbagarden.net/media/upload/a/a5/Spr_SM_Elio.png"
                 onerror="this.src='https://play.pokemonshowdown.com/sprites/trainers/elio.png'"
                 alt="Sacha" class="trainer-sprite">
            <div class="player-info">
                <span class="player-name">Ultra Soleil</span>
                <span class="status-dot offline" id="sunStatus"></span>
            </div>
        </div>

        <div class="player-indicator moon-indicator" id="moonIndicator">
            <div class="player-info">
                <span class="player-name">Ultra Lune</span>
                <span class="status-dot offline" id="moonStatus"></span>
            </div>
            <img src="https://archives.bulbagarden.net/media/upload/e/e1/Spr_SM_Lillie.png"
                 onerror="this.src='https://play.pokemonshowdown.com/sprites/trainers/lillie.png'"
                 alt="Lilie" class="trainer-sprite">
        </div>

        <header>
            <h1>Soul Link Nuzlocke</h1>
            <p class="subtitle">Ultra Soleil & Ultra Lune</p>
        </header>

        <div class="session-setup" id="sessionSetup">
            <h2>Choisis ton jeu</h2>
            <div class="player-select">
                <button class="game-btn sun" onclick="selectPlayer('sun')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/791.png" alt="Solgaleo">
                    Ultra Soleil
                </button>
                <button class="game-btn moon" onclick="selectPlayer('moon')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/792.png" alt="Lunala">
                    Ultra Lune
                </button>
            </div>
        </div>

        <main id="mainApp" style="display:none;">
            <div class="stats-bar">
                <div class="stat sun-stat">
                    <span class="stat-label">Ultra Soleil:</span>
                    <span class="stat-value" id="sunAlive">0</span> vivants
                    <span class="stat-dead" id="sunDead">0</span> morts
                </div>
                <div class="stat moon-stat">
                    <span class="stat-label">Ultra Lune:</span>
                    <span class="stat-value" id="moonAlive">0</span> vivants
                    <span class="stat-dead" id="moonDead">0</span> morts
                </div>
                <button class="admin-btn" onclick="openAdminPanel()">⚙️ Admin</button>
            </div>

            <!-- Panel Admin -->
            <div class="admin-panel" id="adminPanel" style="display:none;">
                <div class="admin-content">
                    <span class="close" onclick="closeAdminPanel()">&times;</span>
                    <h2>🔐 Panel Admin</h2>
                    <div class="admin-login" id="adminLogin">
                        <input type="password" id="adminCode" placeholder="Code admin..." maxlength="10">
                        <button onclick="checkAdminCode()">Valider</button>
                    </div>
                    <div class="admin-actions" id="adminActions" style="display:none;">
                        <button class="reset-btn" onclick="resetAll()">🗑️ Reset toutes les données</button>
                        <button class="reset-players-btn" onclick="resetPlayers()">👥 Reset joueurs</button>
                        <button class="refresh-btn" onclick="hardRefresh()">🔄 Refresh cache</button>
                    </div>
                </div>
            </div>

            <!-- Score des combats rivaux -->
            <div class="rival-score-bar" id="rivalScoreBar">
                <span class="score-title">⚔️ Score Rivaux:</span>
                <span class="score-sun">☀️ <span id="sunWins">0</span></span>
                <span class="score-vs">-</span>
                <span class="score-moon"><span id="moonWins">0</span> 🌙</span>
            </div>

            <div class="zones-container" id="zonesContainer"></div>
        </main>

        <div class="modal" id="pokemonModal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>Ajouter un Pokemon</h2>
                <p class="modal-zone" id="modalZone"></p>
                <input type="text" id="pokemonSearch" placeholder="Rechercher un Pokemon..." oninput="filterPokemon()">
                <div class="pokemon-grid" id="pokemonGrid"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="pokemon-data.js"></script>
    <script src="zones-data.js"></script>
    <script src="nicknames.js"></script>
    <script src="app.js"></script>
</body>
</html>
