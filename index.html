<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Link Nuzlocke - Ultra Sun/Moon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Soul Link Nuzlocke</h1>
            <p class="subtitle">Ultra Soleil & Ultra Lune</p>
        </header>

        <div class="session-setup" id="sessionSetup">
            <h2>Configuration de la session</h2>
            <div class="setup-options">
                <div class="option">
                    <input type="text" id="sessionId" placeholder="Code de session">
                    <button onclick="joinSession()">Rejoindre</button>
                </div>
                <div class="divider">ou</div>
                <button class="btn-primary" onclick="createSession()">Créer une nouvelle session</button>
            </div>
            <div class="player-select" id="playerSelect" style="display:none;">
                <h3>Choisir ton jeu</h3>
                <button class="game-btn sun" onclick="selectPlayer('sun')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/791.png" alt="Solgaleo">
                    Ultra Soleil
                </button>
                <button class="game-btn moon" onclick="selectPlayer('moon')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/792.png" alt="Lunala">
                    Ultra Lune
                </button>
            </div>
        </div>

        <main id="mainApp" style="display:none;">
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-label">Session:</span>
                    <span class="stat-value" id="currentSession">-</span>
                </div>
                <div class="stat sun-stat">
                    <span class="stat-label">Ultra Soleil:</span>
                    <span class="stat-value" id="sunAlive">0</span> vivants
                    <span class="stat-dead" id="sunDead">0</span> morts
                </div>
                <div class="stat moon-stat">
                    <span class="stat-label">Ultra Lune:</span>
                    <span class="stat-value" id="moonAlive">0</span> vivants
                    <span class="stat-dead" id="moonDead">0</span> morts
                </div>
            </div>

            <div class="zones-container" id="zonesContainer"></div>
        </main>

        <div class="modal" id="pokemonModal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>Ajouter un Pokémon</h2>
                <p class="modal-zone" id="modalZone"></p>
                <input type="text" id="pokemonSearch" placeholder="Rechercher un Pokémon..." oninput="filterPokemon()">
                <div class="pokemon-grid" id="pokemonGrid"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="pokemon-data.js"></script>
    <script src="zones-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
